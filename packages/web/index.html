    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy is injected by vite.config.ts on production build
      only — it would break the Vite HMR WebSocket (ws://localhost:*) in dev.
      `frame-ancestors` is intentionally omitted because <meta> cannot enforce
      it per CSP3; clickjacking defense must come from the hosting layer's
      X-Frame-Options or HTTP-header CSP.
    -->

  </head>
  <body class="bg-ink text-cyan-soft font-mono antialiased">
