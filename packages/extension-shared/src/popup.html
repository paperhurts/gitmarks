<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gitmarks</title>
    <style>
      /* Palette mirrors @gitmarks/web (tailwind.config.ts):
         ink #0a0a0f, fog #23232e, cyan #22d3ee, magenta #e879f9. */
      :root { color-scheme: dark; }
      body {
        font-family: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, monospace;
        margin: 0;
        padding: 0;
        background: #0a0a0f;
        color: #e5e7eb;
        min-width: 240px;
      }
      header.brand {
        padding: 0.75rem 1rem 0;
        color: #e879f9;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      main { padding: 0.75rem 1rem 1rem; }
      button {
        width: 100%;
        padding: 0.6rem;
        font: inherit;
        border: 1px solid #22d3ee;
        background: transparent;
        color: #22d3ee;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.12s, color 0.12s;
      }
      button:hover:not(:disabled) { background: #22d3ee; color: #0a0a0f; }
      button:disabled { opacity: 0.5; cursor: progress; }
      /* Success state: stays disabled (no re-save) but reads as done, not busy. */
      button.done { opacity: 1; cursor: default; background: transparent; color: #22d3ee; }
      #status { margin-top: 0.75rem; font-size: 0.85rem; min-height: 1.2em; }
      #status.ok { color: #22d3ee; }
      #status.err { color: #e879f9; }
      .err { color: #e879f9; }
      .title { font-size: 0.85rem; color: #9ca3af; margin: 0 0 0.5rem 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
  </head>
  <body>
    <header class="brand">gitmarks</header>
    <main id="root">loading…</main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
