name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token: the workflow only runs tests/builds and
# never needs to write to the repo or anywhere else.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build core first so its dist/index.d.ts exists for downstream
      # workspace consumers (extension-chrome resolves @gitmarks/core
      # via the package.json "types" field).
      - name: Build core
        run: pnpm --filter @gitmarks/core build

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build everything
        run: pnpm build
